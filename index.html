  <style>

    .btn-edit-tab, .btn-delete-tab { width:26px; height:26px; border-radius:6px; border:none; background:transparent; color:var(--text-dim); cursor:pointer; font-size:0.9rem; display:flex; align-items:center; justify-content:center; opacity:0; transition:0.2s; flex-shrink: 0; }
    .history-item:hover .btn-edit-tab, .history-item:hover .btn-delete-tab { opacity:1; }

    .main-orb-1 { width: 120px; height: 120px; background: radial-gradient(circle, rgba(225, 29, 72, 0.5) 0%, transparent 70%); top: 10%; left: 8%; animation: floatOrb1 8s ease-in-out infinite; }
    .main-orb-2 { width: 90px; height: 90px; background: radial-gradient(circle, rgba(249, 115, 22, 0.45) 0%, transparent 70%); top: 60%; right: 10%; animation: floatOrb2 9s ease-in-out infinite; }
    .main-orb-3 { width: 150px; height: 150px; background: radial-gradient(circle, rgba(236, 72, 153, 0.4) 0%, transparent 70%); bottom: 8%; left: 20%; animation: floatOrb3 7s ease-in-out infinite; }
    .main-orb-4 { width: 100px; height: 100px; background: radial-gradient(circle, rgba(244, 63, 94, 0.45) 0%, transparent 70%); top: 15%; right: 22%; animation: floatOrb4 10s ease-in-out infinite; }
    .main-orb-5 { width: 70px; height: 70px; background: radial-gradient(circle, rgba(190, 18, 60, 0.55) 0%, transparent 70%); top: 45%; left: 3%; animation: floatOrb5 6s ease-in-out infinite; }
    .main-decorative-line { position: absolute; z-index: 2; pointer-events: none; height: 1px; background: linear-gradient(90deg, transparent, rgba(225, 29, 72, 0.5), rgba(249, 115, 22, 0.6), rgba(236, 72, 153, 0.5), transparent); animation: lineShimmer 4s ease-in-out infinite; }
    .main-line-1 { width: 60%; top: 28%; left: 20%; }
    .main-line-2 { width: 45%; top: 68%; left: 27%; animation-delay: 1.5s; background: linear-gradient(90deg, transparent, rgba(244, 63, 94, 0.55), rgba(190, 18, 60, 0.65), rgba(225, 29, 72, 0.5), transparent); }
    @keyframes floatOrb1 { 0%,100%{ transform: translate(0,0) scale(1); } 25%{ transform: translate(60px,-40px) scale(1.2); } 50%{ transform: translate(-20px,-80px) scale(0.9); } 75%{ transform: translate(-50px,-20px) scale(1.1); } }
    @keyframes floatOrb2 { 0%,100%{ transform: translate(0,0) scale(1); } 25%{ transform: translate(-50px,30px) scale(1.15); } 50%{ transform: translate(20px,60px) scale(0.85); } 75%{ transform: translate(40px,10px) scale(1.05); } }
    @keyframes floatOrb3 { 0%,100%{ transform: translate(0,0) scale(1); } 33%{ transform: translate(70px,-50px) scale(1.1); } 66%{ transform: translate(-30px,-30px) scale(0.9); } }

    @keyframes floatOrb5 { 0%,100%{ transform: translate(0,0) scale(1); } 50%{ transform: translate(30px,-60px) scale(1.3); } }

    #top-header { display: flex; align-items: center; justify-content: space-between; height: var(--header-height); padding: 0 12px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 25; position: relative; }
    .header-btn { width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-bright); font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }

<body class="bg-black">

  <script type="module">
    import * as THREE from 'three';
    const container = document.getElementById('shader-container');
    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);
    const material = new THREE.ShaderMaterial({
      uniforms: { iTime: { value: 0 }, iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) } },
      vertexShader: `void main() { gl_Position = vec4(position, 1.0); }`,
      fragmentShader: `uniform float iTime; uniform vec2 iResolution; #define NUM_OCTAVES 3
        float rand(vec2 n) { return fract(sin(dot(n, vec2(12.9898,4.1414)))*43758.5453); }
        float noise(vec2 p) { vec2 ip=floor(p); vec2 u=fract(p); u=u*u*(3.0-2.0*u); return mix(mix(rand(ip),rand(ip+vec2(1.0,0.0)),u.x),mix(rand(ip+vec2(0.0,1.0)),rand(ip+vec2(1.0,1.0)),u.x),u.y)*noise(p)*0.5+0.5; }
        float fbm(vec2 x) { float v=0.0; float a=0.3; vec2 shift=vec2(100); mat2 rot=mat2(cos(0.5),sin(0.5),-sin(0.5),cos(0.5)); for(int i=0;i<NUM_OCTAVES;++i){v+=a*noise(x);x=rot*x*2.0+shift;a*=0.4;} return v; }
        void main() { vec2 p=(gl_FragCoord.xy-iResolution.xy*0.5)/iResolution.y*mat2(6.0,-4.0,4.0,6.0); vec2 v; vec4 o=vec4(0.0); float f=2.0+fbm(p)*0.5; for(float i=0.0;i<35.0;i++) { v=p+cos(i*i+p.x*0.08*0.025+i*vec2(13.0,11.0))*3.5; float tailNoise=fbm(v+vec2(0.5,i))*0.3*(1.0-(i/35.0)); vec4 auroraColors=vec4(0.6+0.4*sin(i*0.2),0.05+0.15*cos(i*0.3),0.1+0.2*sin(i*0.4),1.0); vec4 currentContribution=auroraColors*exp(sin(i*i))/length(max(v,vec2(v.x*f*0.015,v.y*1.5))); float thinnessFactor=smoothstep(0.0,1.0,i/35.0)*0.6; o+=currentContribution*(1.0+tailNoise*0.8)*thinnessFactor; } o=tanh(pow(o/100.0,vec4(1.6))); o.r*=1.2; gl_FragColor=o*1.5; }`
    });
    const geometry = new THREE.PlaneGeometry(2,2);
    scene.add(new THREE.Mesh(geometry,material));
    renderer.render(scene,camera);
    window.addEventListener('resize',()=>{ renderer.setSize(window.innerWidth,window.innerHeight); material.uniforms.iResolution.value.set(window.innerWidth,window.innerHeight); renderer.render(scene,camera); });
    window._cleanupShader = () => { container.removeChild(renderer.domElement); geometry.dispose(); material.dispose(); renderer.dispose(); };
  </script>

  <script>
    (function() {
      const splashScreen = document.getElementById('splash-screen');
      const appContainer = document.getElementById('app-container');
      document.getElementById('btn-get-started').addEventListener('click', () => { splashScreen.classList.add('hidden'); appContainer.classList.add('visible'); setTimeout(() => { if (window._cleanupShader) window._cleanupShader(); }, 600); initMainBackground(); });

      const sidebar = document.getElementById('sidebar');
      const sidebarOverlay = document.getElementById('sidebar-overlay');
      const sidebarHistory = document.getElementById('sidebar-history');
      const chatContainer = document.getElementById('chat-container');
      const chatInput = document.getElementById('chat-input');
      const btnSend = document.getElementById('btn-send');
      const btnNewChat = document.getElementById('btn-new-chat');
      const btnHamburger = document.getElementById('btn-hamburger');
      const btnCloseSidebar = document.getElementById('btn-close-sidebar');
      const btnMenu = document.getElementById('btn-menu');
      const inputArea = document.getElementById('input-area');
      const editModeBar = document.getElementById('edit-mode-bar');
      const btnCancelEdit = document.getElementById('btn-cancel-edit');
      const mainArea = document.getElementById('main-area');
      const modelButtons = document.querySelectorAll('.model-btn');
      const modelIndicator = document.getElementById('model-indicator');

      const STORAGE_KEY = 'wromxz_chat_v23';
      const API_CONFIG = {
        wormgpt: { url: 'https://api-nanzz.my.id/docs/api/ai/worm-gpt.php', param: 'prompt', responsePath: 'result.response', name: 'WORMGPT' },
        blackbox: { url: 'https://api-nanzz.my.id/docs/api/ai/blackbox.php', param: 'q', responsePath: 'result.response', name: 'BLACK BOX' },
        quillbot: { url: 'https://api-nanzz.my.id/docs/api/ai/quillbot.php', param: 'text', responsePath: 'result', name: 'QUILBOT' },
        copilot: { url: 'https://api-nanzz.my.id/docs/api/ai/copilot.php', param: 'q', responsePath: 'result.text', name: 'COPILOT' }
      };

      let state = { tabs: [], activeTabId: null, sidebarOpen: window.innerWidth > 768, activeModel: 'wormgpt' };
      let isSending = false, editingMessage = null, mainBgAnimationId = null, renamingTabId = null;

      document.addEventListener('contextmenu', e => { if (!e.target.closest('.rename-input')) { e.preventDefault(); e.stopPropagation(); return false; } });

      function genId() { return 'tab_'+Date.now()+'_'+Math.random().toString(36).substring(2,9); }
      function timeStr() { const d = new Date(); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); }
      function escapeHtml(t) { const div = document.createElement('div'); div.textContent = t; return div.innerHTML; }
      function stripEmoji(text) { return text.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F1E0}-\u{1F1FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{FE00}-\u{FE0F}\u{1F900}-\u{1F9FF}\u{1F018}-\u{1F270}\u{238C}\u{23CF}\u{23E9}-\u{23F3}\u{23F8}-\u{23FA}\u{200D}\u{20D0}-\u{20FF}\u{2139}-\u{21AA}\u{2300}-\u{23FF}\u{2500}-\u{27BF}\u{2900}-\u{2BFF}\u{3200}-\u{33FF}\u{FE00}-\u{FEFF}\u{1FA00}-\u{1FA6F}\u{1FA70}-\u{1FAFF}\u{1F000}-\u{1F02F}\u{1F0A0}-\u{1F0FF}\u{1F100}-\u{1F64F}\u{1F680}-\u{1F6FF}\u{1F780}-\u{1F7FF}\u{1F800}-\u{1F8FF}\u{1F900}-\u{1F9FF}\u{1FA00}-\u{1FA6F}\u{1FA70}-\u{1FAFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{2B50}\u{2764}\u{2615}]/gu, ''); }
      function stripDisclaimer(text) { let t = text; const patterns = [/^.*disclaimer.*:.*$/gim, /^.*warning.*:.*$/gim, /^.*note:.*(?:illegal|harmful|dangerous).*$/gim, /^.*i must (?:warn|inform|caution).*$/gim, /^.*\[disclaimer\].*$/gim, /^.*\[warning\].*$/gim, /^.*for educational purposes only.*$/gim]; patterns.forEach(p => t = t.replace(p, '')); return t.replace(/\n{3,}/g, '\n\n').trim(); }
      function stripThinkTags(text) { return text.replace(/<think>[\s\S]*?<\/think>/gi, '').trim(); }
      function addSpacing(text) { let t = text.replace(/\.([A-Z])/g, '. $1'); t = t.replace(/([.!?])\s+(?=[A-Z])/g, '$1\n\n'); return t; }
      function resolvePath(obj, path) { return path.split('.').reduce((o, k) => o?.[k], obj); }

      function renderMessageContent(rawText) {
        let escaped = escapeHtml(rawText);
        const codeRegex = /```(\w*)\n?([\s\S]*?)```/g;
        let html = ''; let lastIdx = 0; let match;
        while ((match = codeRegex.exec(escaped)) !== null) {
          html += escaped.substring(lastIdx, match.index).replace(/\n/g, '<br>');
          html += `<div class="code-block"><div class="code-header"><span>${match[1]||'code'}</span><button class="copy-btn" data-code="${escapeHtml(match[2])}">Copy</button></div><pre><code>${match[2]}</code></pre></div>`;
          lastIdx = codeRegex.lastIndex;
        }
        html += escaped.substring(lastIdx).replace(/\n/g, '<br>');
        return html || escaped;
      }

      function getTabName(tab) { if (tab.customName) return tab.customName; const m = tab.messages.find(m=>m.role==='user'); return m ? (m.content.trim().length>30 ? m.content.trim().substring(0,30)+'...' : m.content.trim()) : (tab.name||'Chat'); }
      function getPreview(tab) { if(!tab.messages.length) return 'Belum ada pesan'; const last = tab.messages[tab.messages.length-1]; const p = last.content.trim(); return (last.role==='user'?'Anda: ':'AI: ') + (p.length>45?p.substring(0,45)+'...':p); }
      function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e){} }
      function loadState() { try { const d = localStorage.getItem(STORAGE_KEY); if(d) { const p = JSON.parse(d); if(p.tabs?.length) { state.tabs = p.tabs; state.activeTabId = p.activeTabId || state.tabs[0].id; state.sidebarOpen = p.sidebarOpen ?? true; state.activeModel = p.activeModel || 'wormgpt'; return true; } } } catch(e){} return false; }
      function getActiveTab() { if(!state.activeTabId && state.tabs.length) state.activeTabId = state.tabs[0].id; return state.tabs.find(t=>t.id===state.activeTabId) || null; }

      function updateModelUI() {
        modelButtons.forEach(btn => { btn.classList.toggle('active', btn.dataset.model === state.activeModel); });
        const cfg = API_CONFIG[state.activeModel];
        if (modelIndicator) modelIndicator.textContent = cfg?.name || 'WORMGPT';
        if (chatInput) chatInput.placeholder = `Ketik pesan... (${cfg?.name || 'AI'} - Enter kirim)`;
      }

      function finishRename() { renamingTabId = null; renderSidebar(); }

      function renderSidebar() {
        sidebarHistory.innerHTML = '';
        if(!state.tabs.length) { sidebarHistory.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-dim);">Belum ada riwayat</div>'; return; }
        state.tabs.forEach(tab => {
          const item = document.createElement('div'); item.className = 'history-item' + (tab.id===state.activeTabId?' active':''); item.dataset.tabId = tab.id;
          if (renamingTabId === tab.id) {
            item.innerHTML = `<input class="rename-input" value="${escapeHtml(getTabName(tab))}" autofocus><button class="btn-edit-tab save-rename" style="opacity:1;">&#10003;</button><button class="btn-edit-tab cancel-rename" style="opacity:1;">&#10005;</button>`;
            const input = item.querySelector('.rename-input'); input.focus(); input.select();
            const save = () => { const newName = input.value.trim(); tab.customName = newName || null; finishRename(); renderAll(); };
            input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); save(); } if (e.key === 'Escape') { e.preventDefault(); finishRename(); renderAll(); } });
            item.querySelector('.save-rename').addEventListener('click', e => { e.stopPropagation(); save(); });
            item.querySelector('.cancel-rename').addEventListener('click', e => { e.stopPropagation(); finishRename(); renderAll(); });
            item.addEventListener('click', e => e.stopPropagation());
          } else {
            item.innerHTML = `<div class="info"><div class="name">${escapeHtml(getTabName(tab))}</div><div class="preview">${escapeHtml(getPreview(tab))}</div></div><button class="btn-edit-tab" data-action="edit" data-tab-id="${tab.id}" title="Edit nama">&#x270E;</button><button class="btn-delete-tab" data-action="delete" data-tab-id="${tab.id}" title="Hapus">&#x2715;</button>`;
            item.addEventListener('click', e => { if(e.target.dataset.action==='delete' || e.target.dataset.action==='edit') return; switchTab(tab.id); });
            item.querySelector('.btn-edit-tab').addEventListener('click', e => { e.stopPropagation(); renamingTabId = tab.id; renderSidebar(); });
            item.querySelector('.btn-delete-tab').addEventListener('click', e => { e.stopPropagation(); deleteTab(tab.id); });
          }
          sidebarHistory.appendChild(item);
        });
      }

      function renderChat() {
        const active = getActiveTab(); chatContainer.innerHTML = '';
        if(!active?.messages.length) { chatContainer.innerHTML = `<div class="empty-state"><div class="empty-icon">&#x25C8;</div><div class="empty-title">WROMXZ AI</div><div class="empty-sub">Tulis pesan di bawah. Gunakan panel kiri untuk tab baru dan pilih model AI.</div></div>`; }
        else {
          active.messages.forEach((msg, i) => {
            const bubble = document.createElement('div'); bubble.className = 'chat-bubble ' + (msg.role==='user'?'user':'ai');
            bubble.innerHTML = msg.role==='ai' ? `<div class="bubble-label">WROMXZ</div><div>${renderMessageContent(msg.content)}</div><div class="bubble-time">${escapeHtml(msg.timestamp)}</div><button class="copy-message-btn" data-message-index="${i}">&#x2398;</button>` : `<div class="bubble-label">ANDA</div><div>${escapeHtml(msg.content).replace(/\n/g,'<br>')}</div><div class="bubble-time">${escapeHtml(msg.timestamp)}</div><button class="edit-user-btn" data-message-index="${i}">&#x270E;</button>`;
            chatContainer.appendChild(bubble);
          });
          chatContainer.querySelectorAll('.copy-btn').forEach(b => b.addEventListener('click', e => { e.stopPropagation(); navigator.clipboard.writeText(b.dataset.code).then(() => { b.textContent='Copied!'; setTimeout(()=>b.textContent='Copy',1500); }); }));
          chatContainer.querySelectorAll('.copy-message-btn').forEach(b => b.addEventListener('click', e => { e.stopPropagation(); const msg = active.messages[parseInt(b.dataset.messageIndex)]; if(msg) navigator.clipboard.writeText(msg.content).then(() => { b.classList.add('copied'); b.innerHTML='&#x2713;'; setTimeout(()=>{ b.classList.remove('copied'); b.innerHTML='&#x2398;'; },1500); }); }));
          chatContainer.querySelectorAll('.edit-user-btn').forEach(b => b.addEventListener('click', e => { e.stopPropagation(); startEditMessage(parseInt(b.dataset.messageIndex)); }));
        }
        requestAnimationFrame(() => { chatContainer.scrollTop = chatContainer.scrollHeight; });
      }

      function renderAll() { renderSidebar(); renderChat(); updateSidebarVisibility(); updateModelUI(); saveState(); }
      function updateSidebarVisibility() { if(state.sidebarOpen) { sidebar.classList.remove('collapsed'); if(window.innerWidth<=768) sidebarOverlay.classList.add('active'); } else { sidebar.classList.add('collapsed'); sidebarOverlay.classList.remove('active'); } }
      function createTab() { const t = { id: genId(), name: 'Chat '+(state.tabs.length+1), messages: [], createdAt: Date.now(), customName: null }; state.tabs.push(t); state.activeTabId = t.id; if(window.innerWidth<=768) state.sidebarOpen = false; cancelEdit(); renderAll(); }
      function switchTab(tabId) { if(state.tabs.find(t=>t.id===tabId)) { state.activeTabId = tabId; if(window.innerWidth<=768 && state.sidebarOpen) state.sidebarOpen = false; cancelEdit(); renderAll(); } }
      function deleteTab(tabId) { if(state.tabs.length<=1) { state.tabs[0].messages=[]; state.tabs[0].name='Chat 1'; state.tabs[0].customName=null; state.activeTabId=state.tabs[0].id; cancelEdit(); renderAll(); return; } const idx = state.tabs.findIndex(t=>t.id===tabId); if(idx===-1) return; state.tabs.splice(idx,1); state.activeTabId = state.tabs[Math.min(idx,state.tabs.length-1)].id; cancelEdit(); renderAll(); }
      function startEditMessage(index) { const active = getActiveTab(); if (!active?.messages[index] || active.messages[index].role !== 'user') return; editingMessage = { tabId: active.id, index }; chatInput.value = active.messages[index].content; chatInput.focus(); chatInput.style.height = Math.min(chatInput.scrollHeight, 130) + 'px'; editModeBar.classList.add('visible'); btnSend.innerHTML = '&#x2713;'; btnSend.title = 'Save'; }
      function cancelEdit() { editingMessage = null; chatInput.value = ''; chatInput.style.height = '46px'; editModeBar.classList.remove('visible'); btnSend.innerHTML = '&#x203A;'; btnSend.title = 'Kirim'; }
      function addMessage(tabId, role, content) { const tab = state.tabs.find(t=>t.id===tabId); if(!tab) return; tab.messages.push({ role, content, timestamp: timeStr() }); if(role==='user' && !tab.customName && tab.messages.filter(m=>m.role==='user').length===1) tab.name = content.trim().substring(0,35); renderAll(); }

      async function fetchAI(prompt) {
        const config = API_CONFIG[state.activeModel] || API_CONFIG.wormgpt;
        const url = config.url + '?' + config.param + '=' + encodeURIComponent(prompt);
        const res = await fetch(url, { headers: { 'Accept':'application/json' } });
        if(!res.ok) throw new Error('HTTP '+res.status);
        const data = await res.json();
        let responseText = resolvePath(data, config.responsePath);
        if (typeof responseText !== 'string') throw new Error('Format respons tidak valid');
        responseText = stripEmoji(responseText); responseText = stripDisclaimer(responseText);
        if (state.activeModel === 'blackbox') responseText = stripThinkTags(responseText);
        responseText = addSpacing(responseText); return responseText;
      }

      function adjustAppHeight() { if (window.visualViewport) { const vh = window.visualViewport.height; document.documentElement.style.setProperty('--app-height', `${vh}px`); if (sidebar) sidebar.style.height = `${vh}px`; const ko = vh < window.innerHeight * 0.9; if (ko) { inputArea.style.transform = `translateY(-${window.innerHeight - vh}px)`; chatContainer.style.paddingBottom = inputArea.offsetHeight + 10 + 'px'; } else { inputArea.style.transform = ''; chatContainer.style.paddingBottom = ''; } } }
      if (window.visualViewport) { window.visualViewport.addEventListener('resize', adjustAppHeight); window.visualViewport.addEventListener('scroll', adjustAppHeight); adjustAppHeight(); }

      function createLoadingBubble() { const d = document.createElement('div'); d.className = 'loading-bubble'; d.id = 'loading-indicator'; d.innerHTML = `<div class="loading-header">WROMXZ</div><div class="loading-dots-container"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div><div class="loading-text">Mengetik...</div>`; return d; }

      async function sendMessage() {
        if (isSending) return;
        if (editingMessage) {
          const { tabId, index } = editingMessage;
          const tab = state.tabs.find(t => t.id === tabId);
          if (tab?.messages[index]?.role === 'user') {
            const newText = chatInput.value.trim(); if (!newText) { cancelEdit(); return; }
            tab.messages[index].content = newText;
            if (!tab.customName && tab.messages.filter(m=>m.role==='user')[0] === tab.messages[index]) tab.name = newText.substring(0,35);
            cancelEdit(); renderAll(); chatInput.style.height = '46px';
          } else cancelEdit();
          return;
        }
        const prompt = chatInput.value.trim(); if(!prompt) return;
        let active = getActiveTab(); if(!active) { createTab(); active = getActiveTab(); }
        isSending = true; chatInput.disabled = true; btnSend.disabled = true; chatInput.value = ''; chatInput.style.height = '46px';
        addMessage(active.id, 'user', stripEmoji(prompt));
        const loadingBubble = createLoadingBubble(); chatContainer.appendChild(loadingBubble); chatContainer.scrollTop = chatContainer.scrollHeight;
        try { const aiResp = await fetchAI(prompt); loadingBubble.remove(); addMessage(active.id, 'ai', aiResp); }
        catch(e) { loadingBubble.remove(); addMessage(active.id, 'ai', 'Gagal menghubungi server. Coba lagi.'); }
        chatInput.disabled = false; btnSend.disabled = false; isSending = false;
        chatContainer.scrollTop = chatContainer.scrollHeight; adjustAppHeight();
      }

      btnSend.addEventListener('click', e => { e.preventDefault(); sendMessage(); });
      chatInput.addEventListener('keydown', e => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
      chatInput.addEventListener('input', () => { chatInput.style.height = '46px'; chatInput.style.height = Math.min(chatInput.scrollHeight, 130) + 'px'; if (window.visualViewport?.height < window.innerHeight) chatContainer.style.paddingBottom = inputArea.offsetHeight + 10 + 'px'; });
      btnCancelEdit.addEventListener('click', cancelEdit);

      modelButtons.forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          state.activeModel = btn.dataset.model;
          updateModelUI();
          saveState();
        });
      });

      btnNewChat.addEventListener('click', () => { createTab(); if(window.innerWidth<=768) { state.sidebarOpen=false; updateSidebarVisibility(); saveState(); } });
      btnHamburger.addEventListener('click', () => { state.sidebarOpen = !state.sidebarOpen; updateSidebarVisibility(); saveState(); });
      btnCloseSidebar.addEventListener('click', () => { state.sidebarOpen = false; updateSidebarVisibility(); saveState(); });
      sidebarOverlay.addEventListener('click', () => { state.sidebarOpen = false; updateSidebarVisibility(); saveState(); });
      btnMenu.addEventListener('click', () => { document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen(); });
      document.addEventListener('keydown', e => {
        if((e.ctrlKey||e.metaKey) && e.key==='n') { e.preventDefault(); createTab(); }
        if((e.ctrlKey||e.metaKey) && e.key==='b') { e.preventDefault(); state.sidebarOpen = !state.sidebarOpen; updateSidebarVisibility(); saveState(); }
        if(e.key==='Escape' && editingMessage) { e.preventDefault(); cancelEdit(); }
        if(e.key==='Escape' && renamingTabId) { e.preventDefault(); finishRename(); renderAll(); }
      });

      function initMainBackground() {
        const canvas = document.getElementById('main-bg-canvas'); if (!canvas || mainBgAnimationId) return;
        const ctx = canvas.getContext('2d'); let particles = [];
        const colors = ['rgba(225,29,72,0.75)','rgba(244,63,94,0.7)','rgba(190,18,60,0.7)','rgba(249,115,22,0.7)','rgba(236,72,153,0.7)','rgba(159,18,57,0.7)','rgba(251,113,133,0.7)','rgba(253,164,175,0.7)'];
        function resize() { canvas.width = mainArea.clientWidth; canvas.height = mainArea.clientHeight; }
        class Particle {
          constructor() { this.reset(); this.y = Math.random() * canvas.height; }
          reset() { this.x = Math.random() * canvas.width; this.y = canvas.height + Math.random() * 100; this.size = Math.random() * 3 + 1.2; this.speedY = Math.random() * 0.7 + 0.25; this.speedX = (Math.random() - 0.5) * 0.5; this.color = colors[Math.floor(Math.random() * colors.length)]; this.opacity = Math.random() * 0.8 + 0.25; this.wobble = Math.random() * Math.PI * 2; this.wobbleSpeed = (Math.random() - 0.5) * 0.025; this.wobbleAmp = Math.random() * 1.8; }
          update() { this.y -= this.speedY; this.wobble += this.wobbleSpeed; this.x += this.speedX + Math.sin(this.wobble) * this.wobbleAmp * 0.35; if (this.y < -20) { this.reset(); this.y = canvas.height + Math.random() * 70; this.x = Math.random() * canvas.width; } if (this.x < -20) this.x = canvas.width + 20; if (this.x > canvas.width + 20) this.x = -20; }
          draw() { ctx.save(); ctx.globalAlpha = this.opacity; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fillStyle = this.color; ctx.fill(); ctx.shadowColor = this.color; ctx.shadowBlur = 9; ctx.fill(); ctx.shadowBlur = 0; ctx.restore(); }
        }
        function create() { particles = []; for(let i=0;i<80;i++){ const p=new Particle(); p.y=Math.random()*canvas.height; particles.push(p); } }
        function connections() { for(let i=0;i<particles.length;i++){ for(let j=i+1;j<particles.length;j++){ const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y, dist=Math.sqrt(dx*dx+dy*dy); if(dist<135){ const alpha=(1-dist/135)*0.28; const grad=ctx.createLinearGradient(particles[i].x,particles[i].y,particles[j].x,particles[j].y); grad.addColorStop(0,particles[i].color.replace(/0\.\d+\)/,alpha+')')); grad.addColorStop(1,particles[j].color.replace(/0\.\d+\)/,alpha+')')); ctx.save(); ctx.globalAlpha=alpha; ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y); ctx.strokeStyle=grad; ctx.lineWidth=0.6; ctx.stroke(); ctx.restore(); } } } }
        function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{ p.update(); p.draw(); }); connections(); mainBgAnimationId = requestAnimationFrame(animate); }
        resize(); create(); if(mainBgAnimationId) cancelAnimationFrame(mainBgAnimationId); animate();
        window.addEventListener('resize', () => { resize(); create(); });
      }

      if(!loadState()) { state.tabs = [{ id: genId(), name: 'Chat 1', messages: [], createdAt: Date.now(), customName: null }]; state.activeTabId = state.tabs[0].id; state.sidebarOpen = window.innerWidth > 768; state.activeModel = 'wormgpt'; }
      renderAll(); updateSidebarVisibility(); updateModelUI();
      new MutationObserver(() => { if (appContainer.classList.contains('visible')) adjustAppHeight(); }).observe(appContainer, { attributes: true, attributeFilter: ['class'] });
      window.addEventListener('beforeunload', () => { if (window.visualViewport) { window.visualViewport.removeEventListener('resize', adjustAppHeight); window.visualViewport.removeEventListener('scroll', adjustAppHeight); } if (mainBgAnimationId) cancelAnimationFrame(mainBgAnimationId); });
    })();
  </script>
</body>
