<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
  <title>WROMXZ · AI Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.157.0/build/three.module.js"
      }
    }
  </script>
  <style>
    /* Global reset & chat app variables */
    :root {
      --bg: #0a0000;
      --sidebar-bg: #110000;
      --surface: #180000;
      --surface2: #1f0000;
      --border: #380000;
      --accent: #e53935;
      --accent2: #c62828;
      --accent-glow: #ff5252;
      --text: #e0d0d0;
      --text-dim: #a08888;
      --text-bright: #fff;
      --user-gradient-1: #c62828;
      --user-gradient-2: #8e0000;
      --user-shadow: rgba(198, 40, 40, 0.45);
      --ai-bubble-bg: #1a0000;
      --ai-border: #4a0000;
      --input-bg: #0b0000;
      --scroll-thumb: #5c0000;
      --scroll-track: #1a0000;
      --danger: #ff1744;
      --sidebar-width: 280px;
      --header-height: 44px;
      --tab-height: 38px;
      --input-min-height: 56px;
      --app-height: 100dvh;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      background: #0a0000;
      color: var(--text);
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
      touch-action: manipulation;
      overscroll-behavior: none;
      position: fixed;
      inset: 0;
    }

    /* Splash Screen */
    #splash-screen {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease, visibility 0.5s ease;
      background: #0a0000;
    }
    #splash-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    #shader-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }
    .splash-content {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 0 1rem;
    }

    /* Chat app container */
    #app-container {
      display: flex;
      height: 100%;
      width: 100%;
      position: relative;
      overflow: hidden;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    #app-container.visible {
      opacity: 1;
      visibility: visible;
    }

    /* Sidebar & chat styles */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--scroll-track); border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent2); }

    #sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 90;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease;
    }
    #sidebar-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    #sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      height: 100%;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 100;
      transition: transform 0.28s cubic-bezier(0.4,0,0.2,1), margin 0.28s;
      flex-shrink: 0;
    }
    #sidebar.collapsed {
      transform: translateX(calc(var(--sidebar-width) * -1));
      margin-left: calc(var(--sidebar-width) * -1);
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 1.2rem;
      letter-spacing: 0.04em;
      color: #fff;
      text-shadow: 0 0 18px rgba(229,57,53,0.6);
    }
    .sidebar-logo .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent-glow);
      box-shadow: 0 0 12px var(--accent), 0 0 28px var(--accent);
      animation: logoPulse 2s infinite;
    }
    @keyframes logoPulse {
      0%,100%{ box-shadow: 0 0 10px var(--accent),0 0 22px var(--accent); }
      50%{ box-shadow: 0 0 20px var(--accent-glow),0 0 40px var(--accent); }
    }
    .btn-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: all 0.2s;
    }
    .btn-icon:hover {
      background: var(--surface2);
      border-color: var(--accent2);
      color: #fff;
      box-shadow: 0 0 10px rgba(229,57,53,0.25);
    }

    .sidebar-new-chat { padding: 12px 14px; }
    .btn-new-chat {
      width: 100%;
      padding: 11px 16px;
      border-radius: 10px;
      border: 1px solid var(--accent2);
      background: var(--accent2);
      color: #fff;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.22s;
    }
    .btn-new-chat:hover {
      background: var(--accent);
      border-color: var(--accent-glow);
      box-shadow: 0 0 22px rgba(229,57,53,0.45);
      transform: translateY(-1px);
    }
    .sidebar-divider { height: 1px; background: var(--border); margin: 0 14px; }
    .sidebar-label {
      padding: 10px 18px 4px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      font-weight: 600;
    }
    .sidebar-history {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .history-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 9px;
      cursor: pointer;
      transition: all 0.18s;
      border: 1px solid transparent;
    }
    .history-item:hover { background: var(--surface); border-color: var(--border); }
    .history-item.active { background: var(--surface2); border-color: var(--accent2); box-shadow: inset 0 0 0 1px rgba(229,57,53,0.3); }
    .history-item .info { flex:1; min-width:0; display:flex; flex-direction:column; gap:2px; }
    .history-item .name { font-size:0.85rem; font-weight:500; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .history-item .preview { font-size:0.72rem; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .btn-delete-tab {
      width:26px; height:26px; border-radius:6px; border:none; background:transparent; color:var(--text-dim);
      cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; opacity:0; transition:0.2s;
    }
    .history-item:hover .btn-delete-tab { opacity:1; }
    .btn-delete-tab:hover { background:rgba(255,23,68,0.2); color:var(--danger); }
    .sidebar-footer { padding:8px 14px; border-top:1px solid var(--border); font-size:0.68rem; color:var(--text-dim); text-align:center; }

    #main-area {
      flex:1;
      display:flex;
      flex-direction:column;
      min-width:0;
      background:var(--bg);
      position: relative;
      overflow: hidden;
    }

    #top-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: var(--header-height);
      padding: 0 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 25;
    }
    .header-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-bright);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .header-btn:hover {
      background: var(--surface2);
      border-color: var(--accent2);
      box-shadow: 0 0 10px rgba(229,57,53,0.25);
    }
    .header-title {
      flex: 1;
      text-align: center;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
      color: #fff;
      text-shadow: 0 0 15px rgba(229,57,53,0.6);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #tab-bar {
      display: flex;
      align-items: stretch;
      height: var(--tab-height);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      flex-shrink: 0;
      scroll-behavior: smooth;
    }
    .tab-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 14px;
      cursor: pointer;
      white-space: nowrap;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-dim);
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      flex-shrink: 0;
      max-width: 180px;
    }
    .tab-item:hover { color: #fff; background: rgba(255,255,255,0.03); }
    .tab-item.active { color: #fff; border-bottom-color: var(--accent-glow); background: rgba(229,57,53,0.08); font-weight:600; }
    .tab-item .tab-name { overflow:hidden; text-overflow:ellipsis; flex:1; min-width:0; }
    .tab-item .tab-close {
      width:20px; height:20px; border-radius:4px; border:none; background:transparent; color:var(--text-dim);
      cursor:pointer; font-size:0.85rem; display:flex; align-items:center; justify-content:center; opacity:0; transition:0.15s;
    }
    .tab-item:hover .tab-close, .tab-item.active .tab-close { opacity:0.7; }
    .tab-item .tab-close:hover { opacity:1; color:var(--danger); background:rgba(255,23,68,0.15); }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 18px 20px;
      display:flex;
      flex-direction:column;
      gap:14px;
      background: var(--bg);
      background-image: radial-gradient(ellipse at 50% 30%, rgba(180,0,0,0.05) 0%, transparent 70%);
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }
    .empty-state {
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      color: var(--text-dim);
      text-align:center;
      gap:12px;
    }
    .empty-icon { font-size:3.5rem; opacity:0.4; text-shadow:0 0 30px rgba(229,57,53,0.3); }
    .empty-title { font-size:1.5rem; font-weight:700; color:#fff; }
    .empty-sub { font-size:0.85rem; max-width:380px; line-height:1.6; }

    .chat-bubble {
      max-width: 82%;
      padding: 14px 18px;
      border-radius: 18px;
      line-height: 1.6;
      font-size: 0.9rem;
      letter-spacing: 0.015em;
      word-break: break-word;
      animation: bubbleIn 0.3s ease-out;
      position: relative;
    }
    @keyframes bubbleIn { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:translateY(0);} }
    .chat-bubble.user {
      align-self: flex-end;
      background: linear-gradient(135deg, #c62828, #8e0000);
      color: #fff;
      border-bottom-right-radius: 6px;
      box-shadow: 0 8px 20px rgba(198,40,40,0.5);
    }
    .chat-bubble.ai {
      align-self: flex-start;
      background: #1a0000;
      border: 1px solid #4a0000;
      color: #f0e0e0;
      border-bottom-left-radius: 6px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.6);
    }
    .bubble-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
      opacity: 0.8;
    }
    .chat-bubble.user .bubble-label { color: #ffcdd2; }
    .chat-bubble.ai .bubble-label { color: #ef9a9a; }
    .bubble-time { font-size: 0.6rem; opacity: 0.45; text-align: right; margin-top: 8px; }

    .copy-message-btn {
      position: absolute;
      bottom: 6px;
      right: 6px;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid #5a0000;
      background: rgba(20, 0, 0, 0.8);
      color: #ff8a80;
      cursor: pointer;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      backdrop-filter: blur(4px);
      opacity: 0;
      z-index: 5;
    }
    .chat-bubble.ai:hover .copy-message-btn { opacity: 0.8; }
    .copy-message-btn:hover {
      opacity: 1 !important;
      background: #b71c1c;
      border-color: #ff5252;
      color: #fff;
      box-shadow: 0 0 10px rgba(229,57,53,0.4);
      transform: scale(1.05);
    }
    .copy-message-btn.copied {
      background: #2e7d32;
      border-color: #4caf50;
      color: #fff;
    }

    .code-block {
      margin: 10px 0;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #5a0000;
      background: #0b0000;
    }
    .code-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 12px;
      background: #200000;
      font-size: 0.7rem;
      letter-spacing: 0.04em;
      color: #ff8a80;
      text-transform: uppercase;
    }
    .copy-btn {
      background: transparent;
      border: 1px solid #6a1b1b;
      color: #ffcdd2;
      padding: 3px 10px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.7rem;
      transition: 0.2s;
    }
    .copy-btn:hover { background: #b71c1c; border-color: #ff5252; color: #fff; }
    .code-block pre {
      margin: 0;
      padding: 12px;
      overflow-x: auto;
      font-family: 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.8rem;
      background: #0a0000;
      color: #f8c0c0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Input area - always at bottom, not fixed */
    #input-area {
      padding: 10px 16px 12px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
      z-index: 20;
      position: relative;
    }

    #chat-input {
      flex: 1;
      resize: none;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: #fff;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 0.88rem;
      font-family: inherit;
      line-height: 1.5;
      min-height: 46px;
      max-height: 130px;
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
      overflow-y: auto;
      -webkit-appearance: none;
      appearance: none;
    }
    #chat-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(229,57,53,0.15), 0 0 20px rgba(229,57,53,0.1);
    }
    #btn-send {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      border: 1px solid var(--accent2);
      background: var(--accent2);
      color: #fff;
      font-size: 1.3rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #btn-send:hover { background: var(--accent); box-shadow: 0 0 20px rgba(229,57,53,0.5); }
    #btn-send:disabled { opacity:0.35; pointer-events:none; }

    .loading-bubble {
      align-self: flex-start;
      background: #1a0000;
      border: 1px solid #4a0000;
      border-bottom-left-radius: 6px;
      border-radius: 18px;
      padding: 14px 18px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 80px;
      animation: bubbleIn 0.3s ease-out;
    }
    .loading-header {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #ef9a9a;
      opacity: 0.8;
    }
    .loading-dots-container {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: flex-start;
    }
    .loading-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
      animation: loadingDotAnim 1.2s infinite ease-in-out;
    }
    .loading-dot:nth-child(1) { animation-delay: 0s; }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes loadingDotAnim {
      0%, 60%, 100% {
        transform: translateY(0);
        opacity: 0.4;
        box-shadow: 0 0 6px var(--accent);
      }
      30% {
        transform: translateY(-10px);
        opacity: 1;
        box-shadow: 0 0 16px var(--accent-glow), 0 0 28px var(--accent);
      }
    }

    .loading-text {
      font-size: 0.75rem;
      color: #b71c1c;
      letter-spacing: 0.05em;
      opacity: 0.8;
      font-style: italic;
      text-shadow: 0 0 8px rgba(229,57,53,0.4);
    }

    @media (max-width: 768px) {
      #sidebar {
        position: fixed; left:0; top:0; height:100%; box-shadow:4px 0 24px rgba(0,0,0,0.7);
      }
      #sidebar.collapsed { transform:translateX(-100%); margin-left:0; }
      .chat-bubble { max-width:92%; font-size:0.85rem; }
      #chat-container { padding:12px 10px; }
      #input-area { padding: 8px 12px 10px; }
    }
  </style>
</head>
<body class="bg-black">

  <!-- SPLASH SCREEN -->
  <div id="splash-screen">
    <div id="shader-container"></div>
    <div class="splash-content">
      <h1 class="text-6xl md:text-8xl font-bold mb-4 bg-gradient-to-r from-red-400 via-rose-500 to-orange-500 bg-clip-text text-transparent" style="background-clip: text; -webkit-background-clip: text;">
        WROMXZ AI
      </h1>
      <p class="text-xl md:text-2xl text-gray-300 mb-8">
        Next Generation AI Platform
      </p>
      <div class="flex gap-4 justify-center flex-wrap">
        <button id="btn-get-started" class="px-8 py-3 bg-white/10 backdrop-blur-md border border-white/20 rounded-full hover:bg-white/20 transition-all duration-300 font-semibold text-white cursor-pointer">
          Get Started
        </button>
        <button class="px-8 py-3 bg-gradient-to-r from-red-600 to-orange-600 rounded-full hover:from-red-700 hover:to-orange-700 transition-all duration-300 font-semibold text-white cursor-pointer">
          Learn More
        </button>
      </div>
    </div>
  </div>

  <!-- CHAT APP (hidden initially) -->
  <div id="app-container">
    <div id="sidebar-overlay"></div>

    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo"><span class="dot"></span>WROMXZ</div>
        <button class="btn-icon" id="btn-close-sidebar" title="Tutup panel">&#x2715;</button>
      </div>
      <div class="sidebar-new-chat">
        <button class="btn-new-chat" id="btn-new-chat"><span>+</span> New Chat</button>
      </div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-label">Riwayat Chat</div>
      <div class="sidebar-history" id="sidebar-history"></div>
      <div class="sidebar-footer">WROMXZ AI &middot; v2.1</div>
    </aside>

    <main id="main-area">
      <div id="top-header">
        <button class="header-btn" id="btn-hamburger" title="Panel Riwayat (Ctrl+B)">&#x2630;</button>
        <div class="header-title">WROMXZ</div>
        <button class="header-btn" id="btn-menu" title="Menu">&#x22EE;</button>
      </div>

      <div id="tab-bar"></div>

      <div id="chat-container">
        <div class="empty-state">
          <div class="empty-icon">&#x25C8;</div>
          <div class="empty-title">WROMXZ AI</div>
          <div class="empty-sub">Tulis pesan di bawah. Gunakan panel kiri untuk tab baru.</div>
        </div>
      </div>

      <div id="input-area">
        <textarea id="chat-input" rows="1" placeholder="Ketik pesan... (Enter kirim)" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
        <button id="btn-send" title="Kirim">&#x203A;</button>
      </div>
    </main>
  </div>

  <script type="module">
    import * as THREE from 'three';

    const container = document.getElementById('shader-container');
    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    const material = new THREE.ShaderMaterial({
      uniforms: {
        iTime: { value: 0 },
        iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
      },
      vertexShader: `
        void main() {
          gl_Position = vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform float iTime;
        uniform vec2 iResolution;

        #define NUM_OCTAVES 3

        float rand(vec2 n) {
          return fract(sin(dot(n, vec2(12.9898, 4.1414))) * 43758.5453);
        }

        float noise(vec2 p) {
          vec2 ip = floor(p);
          vec2 u = fract(p);
          u = u*u*(3.0-2.0*u);
          float res = mix(
            mix(rand(ip), rand(ip + vec2(1.0, 0.0)), u.x),
            mix(rand(ip + vec2(0.0, 1.0)), rand(ip + vec2(1.0, 1.0)), u.x), u.y);
          return res * res;
        }

        float fbm(vec2 x) {
          float v = 0.0;
          float a = 0.3;
          vec2 shift = vec2(100);
          mat2 rot = mat2(cos(0.5), sin(0.5), -sin(0.5), cos(0.5));
          for (int i = 0; i < NUM_OCTAVES; ++i) {
            v += a * noise(x);
            x = rot * x * 2.0 + shift;
            a *= 0.4;
          }
          return v;
        }

        void main() {
          vec2 p = (gl_FragCoord.xy - iResolution.xy * 0.5) / iResolution.y * mat2(6.0, -4.0, 4.0, 6.0);
          vec2 v;
          vec4 o = vec4(0.0);
          float f = 2.0 + fbm(p) * 0.5;

          for (float i = 0.0; i < 35.0; i++) {
            v = p + cos(i * i + p.x * 0.08 * 0.025 + i * vec2(13.0, 11.0)) * 3.5;
            float tailNoise = fbm(v + vec2(0.5, i)) * 0.3 * (1.0 - (i / 35.0));
            vec4 auroraColors = vec4(
              0.6 + 0.4 * sin(i * 0.2),
              0.05 + 0.15 * cos(i * 0.3),
              0.1 + 0.2 * sin(i * 0.4),
              1.0
            );
            vec4 currentContribution = auroraColors * exp(sin(i * i)) / length(max(v, vec2(v.x * f * 0.015, v.y * 1.5)));
            float thinnessFactor = smoothstep(0.0, 1.0, i / 35.0) * 0.6;
            o += currentContribution * (1.0 + tailNoise * 0.8) * thinnessFactor;
          }

          o = tanh(pow(o / 100.0, vec4(1.6)));
          o.r *= 1.2;
          gl_FragColor = o * 1.5;
        }
      `
    });

    const geometry = new THREE.PlaneGeometry(2, 2);
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    renderer.render(scene, camera);

    const handleResize = () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      material.uniforms.iResolution.value.set(window.innerWidth, window.innerHeight);
      renderer.render(scene, camera);
    };
    window.addEventListener('resize', handleResize);

    window._cleanupShader = () => {
      window.removeEventListener('resize', handleResize);
      container.removeChild(renderer.domElement);
      geometry.dispose();
      material.dispose();
      renderer.dispose();
    };
  </script>

  <script>
    (function() {
      // Splash transition
      const splashScreen = document.getElementById('splash-screen');
      const appContainer = document.getElementById('app-container');
      const btnGetStarted = document.getElementById('btn-get-started');

      btnGetStarted.addEventListener('click', () => {
        splashScreen.classList.add('hidden');
        appContainer.classList.add('visible');
        setTimeout(() => {
          if (window._cleanupShader) window._cleanupShader();
        }, 600);
        setTimeout(() => {
          const chatInput = document.getElementById('chat-input');
          if (chatInput) chatInput.focus();
        }, 700);
      });

      // === CHAT APP STATE & LOGIC ===
      const sidebar = document.getElementById('sidebar');
      const sidebarOverlay = document.getElementById('sidebar-overlay');
      const sidebarHistory = document.getElementById('sidebar-history');
      const tabBar = document.getElementById('tab-bar');
      const chatContainer = document.getElementById('chat-container');
      const chatInput = document.getElementById('chat-input');
      const btnSend = document.getElementById('btn-send');
      const btnNewChat = document.getElementById('btn-new-chat');
      const btnHamburger = document.getElementById('btn-hamburger');
      const btnCloseSidebar = document.getElementById('btn-close-sidebar');
      const btnMenu = document.getElementById('btn-menu');
      const inputArea = document.getElementById('input-area');
      const mainArea = document.getElementById('main-area');

      const STORAGE_KEY = 'wromxz_chat_v11';
      const API_URL = 'https://api-nanzz.my.id/docs/api/ai/worm-gpt.php';

      let state = {
        tabs: [],
        activeTabId: null,
        sidebarOpen: window.innerWidth > 768,
      };
      let isSending = false;

      function genId() { return 'tab_'+Date.now()+'_'+Math.random().toString(36).substring(2,9); }
      function timeStr() {
        const d = new Date();
        return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
      }
      function escapeHtml(t) {
        const div = document.createElement('div');
        div.textContent = t;
        return div.innerHTML;
      }

      function stripEmoji(text) {
        return text.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F1E0}-\u{1F1FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{FE00}-\u{FE0F}\u{1F900}-\u{1F9FF}\u{1F018}-\u{1F270}\u{238C}\u{23CF}\u{23E9}-\u{23F3}\u{23F8}-\u{23FA}\u{200D}\u{20D0}-\u{20FF}\u{2139}-\u{21AA}\u{2300}-\u{23FF}\u{2500}-\u{27BF}\u{2900}-\u{2BFF}\u{3200}-\u{33FF}\u{FE00}-\u{FEFF}\u{1FA00}-\u{1FA6F}\u{1FA70}-\u{1FAFF}\u{1F000}-\u{1F02F}\u{1F0A0}-\u{1F0FF}\u{1F100}-\u{1F64F}\u{1F680}-\u{1F6FF}\u{1F780}-\u{1F7FF}\u{1F800}-\u{1F8FF}\u{1F900}-\u{1F9FF}\u{1FA00}-\u{1FA6F}\u{1FA70}-\u{1FAFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{2B50}\u{2764}\u{2615}]/gu, '');
      }

      function stripDisclaimer(text) {
        let t = text;
        const patterns = [
          /^.*disclaimer.*:.*$/gim, /^.*warning.*:.*$/gim,
          /^.*note:.*(?:illegal|harmful|dangerous).*$/gim,
          /^.*i must (?:warn|inform|caution).*$/gim,
          /^.*\[disclaimer\].*$/gim, /^.*\[warning\].*$/gim,
          /^.*for educational purposes only.*$/gim,
        ];
        patterns.forEach(p => t = t.replace(p, ''));
        return t.replace(/\n{3,}/g, '\n\n').trim();
      }

      function addSpacing(text) {
        let t = text.replace(/\.([A-Z])/g, '. $1');
        t = t.replace(/([.!?])\s+(?=[A-Z])/g, '$1\n\n');
        return t;
      }

      function renderMessageContent(rawText) {
        let escaped = escapeHtml(rawText);
        const codeRegex = /```(\w*)\n?([\s\S]*?)```/g;
        let html = '';
        let lastIdx = 0;
        let match;
        while ((match = codeRegex.exec(escaped)) !== null) {
          html += escaped.substring(lastIdx, match.index).replace(/\n/g, '<br>');
          const lang = match[1] || 'code';
          const code = match[2];
          html += `
            <div class="code-block">
              <div class="code-header"><span>${lang}</span><button class="copy-btn" data-code="${escapeHtml(match[2])}">Copy</button></div>
              <pre><code>${code}</code></pre>
            </div>`;
          lastIdx = codeRegex.lastIndex;
        }
        html += escaped.substring(lastIdx).replace(/\n/g, '<br>');
        return html || escaped;
      }

      function getTabName(tab) {
        const userMsg = tab.messages.find(m=>m.role==='user');
        if(userMsg) {
          const c = userMsg.content.trim();
          return c.length>30 ? c.substring(0,30)+'...' : c;
        }
        return tab.name || 'Chat';
      }

      function getPreview(tab) {
        if(tab.messages.length===0) return 'Belum ada pesan';
        const last = tab.messages[tab.messages.length-1];
        const p = last.content.trim();
        return (last.role==='user'?'Anda: ':'AI: ') + (p.length>45?p.substring(0,45)+'...':p);
      }

      function saveState() {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e){}
      }
      function loadState() {
        try {
          const d = localStorage.getItem(STORAGE_KEY);
          if(d) {
            const p = JSON.parse(d);
            if(p.tabs && p.tabs.length) {
              state.tabs = p.tabs;
              state.activeTabId = p.activeTabId || state.tabs[0].id;
              state.sidebarOpen = p.sidebarOpen !== undefined ? p.sidebarOpen : true;
              return true;
            }
          }
        } catch(e){}
        return false;
      }

      function getActiveTab() {
        if(!state.activeTabId && state.tabs.length) state.activeTabId = state.tabs[0].id;
        return state.tabs.find(t=>t.id===state.activeTabId) || null;
      }

      function renderSidebar() {
        sidebarHistory.innerHTML = '';
        if(!state.tabs.length) {
          sidebarHistory.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-dim);">Belum ada riwayat</div>';
          return;
        }
        state.tabs.forEach(tab => {
          const item = document.createElement('div');
          item.className = 'history-item' + (tab.id===state.activeTabId?' active':'');
          item.dataset.tabId = tab.id;
          item.innerHTML = `
            <div class="info">
              <div class="name">${escapeHtml(getTabName(tab))}</div>
              <div class="preview">${escapeHtml(getPreview(tab))}</div>
            </div>
            <button class="btn-delete-tab" data-action="delete" data-tab-id="${tab.id}">&#x2715;</button>`;
          item.addEventListener('click', (e) => {
            if(e.target.dataset.action==='delete') return;
            switchTab(tab.id);
          });
          item.querySelector('.btn-delete-tab').addEventListener('click', (e) => {
            e.stopPropagation();
            deleteTab(tab.id);
          });
          sidebarHistory.appendChild(item);
        });
      }

      function renderTabBar() {
        const existing = tabBar.querySelectorAll('.tab-item');
        existing.forEach(e=>e.remove());
        state.tabs.forEach(tab => {
          const div = document.createElement('div');
          div.className = 'tab-item' + (tab.id===state.activeTabId?' active':'');
          div.dataset.tabId = tab.id;
          div.innerHTML = `<span class="tab-name">${escapeHtml(getTabName(tab))}</span>
            <button class="tab-close" data-action="close-tab" data-tab-id="${tab.id}">&#x2715;</button>`;
          div.addEventListener('click', (e) => {
            if(e.target.dataset.action==='close-tab') { e.stopPropagation(); deleteTab(tab.id); return; }
            switchTab(tab.id);
          });
          tabBar.appendChild(div);
        });
      }

      function renderChat() {
        const active = getActiveTab();
        chatContainer.innerHTML = '';
        if(!active || active.messages.length===0) {
          chatContainer.innerHTML = `<div class="empty-state">
            <div class="empty-icon">&#x25C8;</div><div class="empty-title">WROMXZ AI</div>
            <div class="empty-sub">Tulis pesan di bawah. Gunakan panel kiri untuk tab baru.</div></div>`;
        } else {
          active.messages.forEach((msg, index) => {
            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble ' + (msg.role==='user'?'user':'ai');
            const label = msg.role==='user'?'ANDA':'WROMXZ';
            if(msg.role==='ai') {
              bubble.innerHTML = `
                <div class="bubble-label">${label}</div>
                <div>${renderMessageContent(msg.content)}</div>
                <div class="bubble-time">${escapeHtml(msg.timestamp)}</div>
                <button class="copy-message-btn" data-message-index="${index}" title="Salin pesan">&#x2398;</button>`;
            } else {
              bubble.innerHTML = `
                <div class="bubble-label">${label}</div>
                <div>${escapeHtml(msg.content).replace(/\n/g,'<br>')}</div>
                <div class="bubble-time">${escapeHtml(msg.timestamp)}</div>`;
            }
            chatContainer.appendChild(bubble);
          });

          chatContainer.querySelectorAll('.copy-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
              e.stopPropagation();
              const code = btn.dataset.code;
              navigator.clipboard.writeText(code).then(() => {
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = 'Copy', 1500);
              }).catch(() => alert('Gagal menyalin'));
            });
          });

          chatContainer.querySelectorAll('.copy-message-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
              e.stopPropagation();
              const index = parseInt(btn.dataset.messageIndex);
              if (active && active.messages[index]) {
                const messageContent = active.messages[index].content;
                navigator.clipboard.writeText(messageContent).then(() => {
                  btn.classList.add('copied');
                  btn.textContent = '\u2713';
                  setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.textContent = '\u2398';
                  }, 1500);
                }).catch(() => alert('Gagal menyalin pesan'));
              }
            });
          });
        }
        requestAnimationFrame(() => { chatContainer.scrollTop = chatContainer.scrollHeight; });
      }

      function renderAll() {
        renderSidebar();
        renderTabBar();
        renderChat();
        updateSidebarVisibility();
        saveState();
      }

      function updateSidebarVisibility() {
        if(state.sidebarOpen) {
          sidebar.classList.remove('collapsed');
          if(window.innerWidth<=768) sidebarOverlay.classList.add('active');
        } else {
          sidebar.classList.add('collapsed');
          sidebarOverlay.classList.remove('active');
        }
      }

      function createTab() {
        const newTab = { id: genId(), name: 'Chat '+(state.tabs.length+1), messages: [], createdAt: Date.now() };
        state.tabs.push(newTab);
        state.activeTabId = newTab.id;
        if(window.innerWidth<=768) state.sidebarOpen = false;
        renderAll();
        focusInput();
      }

      function switchTab(tabId) {
        if(state.tabs.find(t=>t.id===tabId)) {
          state.activeTabId = tabId;
          if(window.innerWidth<=768 && state.sidebarOpen) { state.sidebarOpen = false; }
          renderAll();
          focusInput();
        }
      }

      function deleteTab(tabId) {
        if(state.tabs.length<=1) {
          const tab = state.tabs[0];
          tab.messages = []; tab.name = 'Chat 1'; state.activeTabId = tab.id;
          renderAll();
          focusInput();
          return;
        }
        const idx = state.tabs.findIndex(t=>t.id===tabId);
        if(idx===-1) return;
        state.tabs.splice(idx,1);
        state.activeTabId = state.tabs[Math.min(idx, state.tabs.length-1)].id;
        renderAll();
        focusInput();
      }

      function addMessage(tabId, role, content) {
        const tab = state.tabs.find(t=>t.id===tabId);
        if(!tab) return;
        tab.messages.push({ role, content, timestamp: timeStr() });
        if(role==='user' && tab.messages.filter(m=>m.role==='user').length===1) {
          tab.name = content.trim().substring(0,35);
        }
        renderAll();
      }

      async function fetchAI(prompt) {
        const url = API_URL + '?prompt=' + encodeURIComponent(prompt);
        const res = await fetch(url, { headers: { 'Accept':'application/json' } });
        if(!res.ok) throw new Error('HTTP '+res.status);
        const data = await res.json();
        if(data?.result?.response) {
          let resp = data.result.response;
          resp = stripEmoji(resp);
          resp = stripDisclaimer(resp);
          resp = addSpacing(resp);
          return resp;
        }
        throw new Error('Format respons tidak valid');
      }

      function focusInput() {
        if (isSending) return;
        chatInput.focus();
        if (document.activeElement !== chatInput) {
          setTimeout(() => {
            chatInput.focus();
            if (navigator.userAgent.match(/iPhone|iPad|iPod/i)) {
              chatInput.click();
            }
          }, 80);
        }
      }

      // Fungsi untuk mengunci input mengikuti keyboard
      function adjustAppHeight() {
        if (window.visualViewport) {
          const viewportHeight = window.visualViewport.height;
          const windowHeight = window.innerHeight;
          const keyboardHeight = windowHeight - viewportHeight;
          
          // Update CSS variable untuk tinggi app
          document.documentElement.style.setProperty('--app-height', `${viewportHeight}px`);
          
          // Update tinggi elemen penting
          if (sidebar) sidebar.style.height = `${viewportHeight}px`;
          
          // Jika keyboard terbuka (tinggi viewport < window height)
          if (keyboardHeight > 0) {
            // Pastikan input area tetap di atas keyboard
            inputArea.style.transform = `translateY(-${keyboardHeight}px)`;
            // Tambahkan padding pada chat container agar konten tidak tertutup
            chatContainer.style.paddingBottom = `${inputArea.offsetHeight + 10}px`;
          } else {
            inputArea.style.transform = '';
            chatContainer.style.paddingBottom = '';
          }
        }
      }

      // Panggil saat pertama kali dan saat visualViewport berubah
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', adjustAppHeight);
        window.visualViewport.addEventListener('scroll', adjustAppHeight);
        adjustAppHeight();
      }

      // Fallback untuk browser tanpa visualViewport
      window.addEventListener('resize', () => {
        if (!window.visualViewport) {
          const vh = window.innerHeight;
          document.documentElement.style.setProperty('--app-height', `${vh}px`);
          if (sidebar) sidebar.style.height = `${vh}px`;
        }
      });

      function createLoadingBubble() {
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'loading-bubble';
        loadingDiv.id = 'loading-indicator';
        loadingDiv.innerHTML = `
          <div class="loading-header">WROMXZ</div>
          <div class="loading-dots-container">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
          </div>
          <div class="loading-text">Mengetik...</div>
        `;
        return loadingDiv;
      }

      async function sendMessage() {
        if (isSending) return;
        const prompt = chatInput.value.trim();
        if(!prompt) {
          focusInput();
          return;
        }

        let active = getActiveTab();
        if(!active) { createTab(); active = getActiveTab(); }

        isSending = true;
        chatInput.disabled = true;
        btnSend.disabled = true;
        chatInput.value = '';
        chatInput.style.height = '46px';

        const cleanPrompt = stripEmoji(prompt);
        addMessage(active.id, 'user', cleanPrompt);

        const loadingBubble = createLoadingBubble();
        chatContainer.appendChild(loadingBubble);
        chatContainer.scrollTop = chatContainer.scrollHeight;

        try {
          const aiResp = await fetchAI(cleanPrompt);
          loadingBubble.remove();
          addMessage(active.id, 'ai', aiResp);
        } catch(e) {
          loadingBubble.remove();
          addMessage(active.id, 'ai', 'Gagal menghubungi server. Coba lagi.');
        }

        chatInput.disabled = false;
        btnSend.disabled = false;
        isSending = false;

        // Fokus kembali dengan mempertimbangkan keyboard
        setTimeout(() => {
          chatInput.focus();
          // Scroll chat container ke bawah
          chatContainer.scrollTop = chatContainer.scrollHeight;
          // Adjust height lagi setelah kirim
          adjustAppHeight();
        }, 150);
      }

      btnSend.addEventListener('click', (e) => {
        e.preventDefault();
        sendMessage();
      });

      chatInput.addEventListener('keydown', (e) => {
        if(e.key==='Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      chatInput.addEventListener('input', () => {
        chatInput.style.height = '46px';
        const newHeight = Math.min(chatInput.scrollHeight, 130);
        chatInput.style.height = newHeight + 'px';
        // Sesuaikan padding bottom saat input bertambah tinggi
        if (window.visualViewport && window.visualViewport.height < window.innerHeight) {
          chatContainer.style.paddingBottom = `${inputArea.offsetHeight + 10}px`;
        }
      });

      chatContainer.addEventListener('touchstart', (e) => {
        if (!isSending && e.target.tagName !== 'BUTTON' && e.target.tagName !== 'TEXTAREA') {
          setTimeout(() => {
            if (!isSending && document.activeElement !== chatInput) {
              chatInput.focus();
            }
          }, 50);
        }
      });

      btnNewChat.addEventListener('click', () => {
        createTab();
        if(window.innerWidth<=768) { state.sidebarOpen=false; updateSidebarVisibility(); saveState(); }
      });

      btnHamburger.addEventListener('click', () => {
        state.sidebarOpen = !state.sidebarOpen;
        updateSidebarVisibility();
        saveState();
      });
      btnCloseSidebar.addEventListener('click', () => {
        state.sidebarOpen = false;
        updateSidebarVisibility();
        saveState();
      });
      sidebarOverlay.addEventListener('click', () => {
        state.sidebarOpen = false;
        updateSidebarVisibility();
        saveState();
      });

      btnMenu.addEventListener('click', () => {
        if(!document.fullscreenElement) {
          document.documentElement.requestFullscreen();
        } else {
          document.exitFullscreen();
        }
      });

      document.addEventListener('keydown', (e) => {
        if((e.ctrlKey||e.metaKey) && e.key==='n') { e.preventDefault(); createTab(); }
        if((e.ctrlKey||e.metaKey) && e.key==='b') {
          e.preventDefault();
          state.sidebarOpen = !state.sidebarOpen;
          updateSidebarVisibility();
          saveState();
        }
      });

      // Init chat state
      if(!loadState()) {
        state.tabs = [{ id: genId(), name: 'Chat 1', messages: [], createdAt: Date.now() }];
        state.activeTabId = state.tabs[0].id;
        state.sidebarOpen = window.innerWidth > 768;
      }
      renderAll();
      updateSidebarVisibility();

      // Adjust height setelah visible
      const observer = new MutationObserver(() => {
        if (appContainer.classList.contains('visible')) {
          adjustAppHeight();
          observer.disconnect();
        }
      });
      observer.observe(appContainer, { attributes: true, attributeFilter: ['class'] });

      // Cleanup
      window.addEventListener('beforeunload', () => {
        if (window.visualViewport) {
          window.visualViewport.removeEventListener('resize', adjustAppHeight);
          window.visualViewport.removeEventListener('scroll', adjustAppHeight);
        }
      });
    })();
  </script>
</body>
</html>
